name: Deploy to Trigger.dev

# Auto-deploys the Trigger.dev tasks on every push to master.
# Requires a repo secret TRIGGER_ACCESS_TOKEN (cloud.trigger.dev -> Personal Access Tokens).

on:
  push:
    branches:
      - master

concurrency:
  group: trigger-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Deploy
        env:
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
        # Pinned to match the @trigger.dev/sdk version in package.json — a mismatched CLI can fail the deploy.
        run: npx trigger.dev@4.4.6 deploy
